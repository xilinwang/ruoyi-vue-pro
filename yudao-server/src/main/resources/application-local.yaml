# Note: 微信公众号/小程序配置已禁用（StudyBuddy 未使用）

--- #################### 芋道相关配置 ####################

# 芋道配置项，设置当前项目所有自定义的配置
yudao:
  captcha:
    enable: false # 本地环境，暂时关闭图片验证码，方便登录等接口的测试；
  security:
    mock-enable: true
  # pay:  # 支付配置已禁用（StudyBuddy 不需要支付功能）
  access-log: # 访问日志的配置项
    enable: false
  demo: false # 关闭演示模式
  # wxa-code:  # 小程序配置已禁用（StudyBuddy 未使用）
  # tencent-lbs-key:  # 腾讯地图密钥已禁用（StudyBuddy 未使用）

# 禁用 JustAuth 第三方登录（StudyBuddy 未使用）- 保留空配置以防止启动错误
justauth:
  enabled: false

# 微信公众号占位配置（防止启动错误）
wx:
  mp:
    app-id: placeholder
    secret: placeholder

# StudyBuddy 智能学习辅助系统配置
studybuddy:
  ocr:
    aliyun:
      access-key-id: ${ALIYUN_ACCESS_KEY_ID:} # 阿里云 Access Key ID
      access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:} # 阿里云 Access Key Secret
      endpoint: https://ocr-api.cn-shanghai.aliyuncs.com # OCR 服务端点
    iflow:
      base-url: ${IFLOW_OCR_BASE_URL:https://apis.iflow.cn/v1} # iFlow OCR API 地址
      api-key: ${IFLOW_OCR_API_KEY:} # iFlow OCR API Key
      model: ${IFLOW_OCR_MODEL:qwen3-vl-plus} # 模型名称
  llm:
    provider: ${LLM_PROVIDER:deepseek} # LLM 提供商：deepseek 或 qwen
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:} # DeepSeek API Key
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com} # DeepSeek API 地址
      model: ${DEEPSEEK_MODEL:deepseek-chat} # 模型名称
    qwen:
      api-key: ${QWEN_API_KEY:} # Qwen API Key
      base-url: ${QWEN_BASE_URL:https://apis.iflow.cn/v1} # Qwen API 地址
      model: ${QWEN_MODEL:qwen3-max} # 模型名称
    timeout: 120 # 超时时间（秒）

